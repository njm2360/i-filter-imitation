services:

  proxy:
    build:
      context: .
      args:
        CMD: proxy
    ports:
      - "15080:15080"
    environment:
      LISTEN_ADDR: ":15080"
      CA_CERT: /data/ca/ca.crt
      CA_KEY: /data/ca/ca.key
      REDIS_URL: redis://redis:6379
      CLAMD_ADDR: tcp://clamav:3310
      SCAN_TEMP_DIR: /tmp/scan
      SCAN_TTL_MINUTES: "60"
      # SYSLOG_NET: udp
      # SYSLOG_ADDR: syslog:514
      # SYSLOG_HOSTNAME: filter-proxy
    volumes:
      - ca_data:/data/ca
    depends_on:
      redis:
        condition: service_healthy
      clamav:
        condition: service_started
      api:
        condition: service_healthy

  api:
    build:
      context: .
      args:
        CMD: api
    expose:
      - "8080"
    environment:
      LISTEN_ADDR: ":8080"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://redis:6379
      API_KEY: ${API_KEY}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: deploy/frontend/Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./deploy/nginx/certs:/etc/nginx/certs:ro  # for HTTPS
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  clamav:
    image: clamav/clamav:stable
    environment:
      CLAMD_CONF_StreamMaxLength: 500M
    volumes:
      - clamav_db:/var/lib/clamav

volumes:
  ca_data:
  redis_data:
  pg_data:
  clamav_db:
